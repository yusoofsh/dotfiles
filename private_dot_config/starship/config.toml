[character]
success_symbol = "[тЭп](bold #f8f8f2)"
error_symbol = "[тЭп](bold #ff5555)"

[cmd_duration]
style = "bold #f1fa8c"

[dart]
format = "via [$symbol ($version)]($style) "
symbol = "юЮШ"

[directory]
style = "bold #50fa7b"

[git_branch]
format = "[$symbol ($branch)]($style)"
style = "bold #ff79c6"
symbol = "юЬе"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "bold #ff5555"
conflicted = "тАЛ"
untracked = "тАЛ"
modified = "тАЛ"
staged = "тАЛ"
renamed = "тАЛ"
deleted = "тАЛ"
stashed = "тЙб"

[hostname]
style = "bold #ff5555"

[nodejs]
format = "via [$symbol ($version)]($style) "
symbol = "явШ"

[package]
format = "is [$symbol ($version)]($style) "
symbol = "яСФ"

[rust]
format = "via [$symbol ($version)]($style) "
symbol = "юЮи"

[username]
format = "[$user]($style) on "
style_user = "bold #bd93f9"
